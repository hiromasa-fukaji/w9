<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>w9 課題参考</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300&display=swap" rel="stylesheet">
  <style>
    body {
      background: #0077ff;
      color: #fff;
      font-family: 'IBM Plex Mono', monospace;
      font-weight: 300;
      margin: 0;
      padding: 40px;
    }

    h1 {
      font-weight: 300;
      font-size: 18px;
      letter-spacing: 0.01em;
      text-align: left;
      margin-bottom: 40px;
      margin-left: 0px;
    }

    /* Pinterest風グリッド */
    .gallery {
      column-count: 5;
      column-gap: 20px;
      margin: auto;
      padding: 0 0px;
    }

    /* レスポンシブ対応 */
    @media (max-width: 1600px) {
      .gallery {
        column-count: 4;
      }
    }

    @media (max-width: 1200px) {
      .gallery {
        column-count: 3;
      }
    }

    @media (max-width: 900px) {
      .gallery {
        column-count: 2;
      }
    }

    @media (max-width: 600px) {
      .gallery {
        column-count: 1;
      }
    }

    .card {
      position: relative;
      background: transparent;
      overflow: visible;
      text-decoration: none;
      color: inherit;
      display: inline-block;
      width: 100%;
      margin-bottom: 20px;
      box-sizing: border-box;
      break-inside: avoid;
    }

    .thumb-wrap {
      position: relative;
      display: block;
    }

    .thumb-link {
      display: block;
      text-decoration: none;
      transition: transform 0.2s;
    }

    .thumb-link:hover {
      transform: translateY(-5px);
    }

    .thumb {
      width: 100%;
      height: auto;
      display: block;
      background: #000;
    }

    .code-btn {
      display: inline-block;
      background: rgba(0, 0, 0);
      color: #ffffff;
      padding: 1px 5px;
      font-size: 12px;
      text-decoration: none;
      border-radius: 0px;
      font-family: 'IBM Plex Mono', monospace;
      transition: background 0.2s, color 0.2s;
    }

    .code-btn:hover {
      background: rgba(0, 119, 255, 0.9);
      color: #fff;
    }

    .info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 5px 0;
    }

    .title {
      font-size: 14px;
      font-weight: bold;
      margin: 0;
    }

    .date {
      font-size: 12px;
      color: #888;
      margin-top: 5px;
    }
  </style>
</head>

<body>
  <h1>w9 課題参考</h1>
  <div class="gallery" id="gallery"></div>

  <script>
    // JSONを読み込んでDOM生成
    fetch('./projects.json')
      .then(res => res.json())
      .then(projects => {
        projects.reverse();
        const gallery = document.getElementById('gallery');
        projects.forEach(p => {
          const card = document.createElement('div');
          card.className = 'card';
          // サムネイルの縦横比を維持
          let imgTag = `<img src="${p.path}/${p.thumb}" class="thumb" loading="lazy"`;
          if (p.width && p.height) {
            imgTag += ` style="aspect-ratio: ${p.width} / ${p.height};"`;
          }
          imgTag += '>';
          card.innerHTML = `
            <a href="${p.path}/index.html" class="thumb-link">
              <div class="thumb-wrap">
                ${imgTag}
              </div>
            </a>
            <div class="info">
              <h2 class="title">${p.name}</h2>
              <a class="code-btn" href="code.html?project=${p.path}">&lt;/&gt;</a>
            </div>
          `;
          gallery.appendChild(card);
        });
      });
  </script>
</body>

</html>
